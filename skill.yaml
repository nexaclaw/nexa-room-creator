skill:
  id: nexa-room-creator
  name: Nexa Room Creator
  version: "1.0.0"
  
description: |
  Nexa Chat 房间创建器，一键创建聊天室、派对、会议、游戏、K歌等房间。
  
  功能：
  - 多种房间类型
  - 自动生成房间设计
  - 邀请码生成
  - 房间配置管理
  
  Nexa Chat - https://nexaclaw.cn/

trigger_phrases:
  - 创建房间
  - 开房间
  - 新建聊天室
  - 派对房间

examples:
  - user: "创建一个游戏房间"
    action: "execute"
    command: "python room_creator.py 游戏房间 --type game"
    
  - user: "列出所有房间类型"
    action: "execute"
    command: "python room_creator.py --list-types"

metadata:
  author: Nexa Claw
  website: https://nexaclaw.cn/
